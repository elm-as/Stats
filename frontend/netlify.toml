[build]
  command = "npm run build"
  publish = "dist"
  base = "frontend"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://openstats-backend.onrender.com"

# Redirection de l'API vers Render (évite les problèmes de CORS)
[[redirects]]
  from = "/api/*"
  to = "https://openstats-backend.onrender.com/api/:splat"
  status = 200
  force = true

# Fallback pour React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
